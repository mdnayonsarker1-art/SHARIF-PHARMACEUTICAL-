<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Collection Entry</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .main-card { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.2);
            width: 100%; max-width: 420px;
            overflow: hidden;
        }

        /* --- New Navigation Layout (Back - Indicator - Home) --- */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }

        .nav-link {
            width: 42px;
            height: 42px;
            background: #ffffff;
            border: 1.5px solid #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-link:active {
            transform: scale(0.9);
            background: #f8fafc;
        }

        .nav-link i {
            font-size: 14px;
            pointer-events: none;
        }

        /* Center Indicator Style */
        .status-pill {
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        /* --------------------------- */

        .online-glow { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .offline-glow { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .online-dot { background: #22c55e; animation: pulse 2s infinite; }
        .offline-dot { background: #ef4444; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .input-group {
            background: white;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .input-group:focus-within { border-color: #3b82f6; transform: translateY(-1px); }

        .save-btn {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; border-radius: 50%;
            font-weight: 800; border: 6px solid #f8fafc;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
            cursor: pointer; transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-3xl font-bold shadow-2xl opacity-0 z-[200] transition-all duration-500 text-sm">
        ✨ ACTION SUCCESSFUL
    </div>

    <div class="main-card p-6 animate__animated animate__fadeInUp">
        
        <div class="header-nav">
            <a href="details.html" class="nav-link text-slate-400">
                <i class="fa-solid fa-chevron-left"></i>
            </a>

            <div id="net-status" class="status-pill online-glow">
                <span class="dot online-dot"></span>
                <span id="status-text">ONLINE</span>
            </div>

            <a href="index.html" class="nav-link text-blue-500">
                <i class="fa-solid fa-house-chimney"></i>
            </a>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-xs font-extrabold text-slate-400 uppercase tracking-[4px] mb-2">Sharif Pharma</h1>
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Collection Entry</h2>
            <div class="mt-4 inline-block bg-slate-900 text-white px-10 py-3 rounded-2xl shadow-xl transform -rotate-1">
                <span id="display-group" class="text-xl font-black italic tracking-widest">...</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="input-group p-1 px-4">
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Date</label>
                <input type="date" id="entry-date" class="w-full pb-2 bg-transparent text-slate-700 font-bold outline-none">
            </div>

            <div class="input-group p-1 px-4">
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Pharmacy Name</label>
                <input type="text" list="customer-list" id="cust-name" class="w-full pb-2 bg-transparent text-slate-700 font-bold outline-none uppercase placeholder:text-slate-300" placeholder="SEARCH PHARMACY...">
                <datalist id="customer-list"></datalist>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="input-group p-1 px-4 border-blue-50">
                    <label class="text-[10px] font-extrabold text-blue-400 uppercase tracking-wider">Amount</label>
                    <input type="number" id="pay-received" class="w-full pb-2 bg-transparent text-blue-600 font-black text-xl outline-none placeholder:text-blue-100" placeholder="0.00">
                </div>
                <div class="input-group p-1 px-4">
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Inv / Note</label>
                    <input type="text" id="inv-value" class="w-full pb-2 bg-transparent text-slate-600 font-bold outline-none placeholder:text-slate-300" placeholder="NO.">
                </div>
            </div>
        </div>

        <div class="mt-8 flex flex-col items-center">
            <button id="saveBtn" class="save-btn mb-6">SAVE</button>
            
            <button id="viewPendingBtn" class="flex items-center gap-2 text-[10px] font-black text-slate-400 hover:text-blue-600 transition-all uppercase tracking-widest">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Pending Records 
                <span id="pendingCountBadge" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </div>

    <script type="module">
        // Firebase configuration and logic (Pre-existing)
        // ... (Same logic for Save, Pending, and Syncing)

        function updateNetStatus() {
            const statusBox = document.getElementById('net-status');
            const statusText = document.getElementById('status-text');
            const dot = statusBox.querySelector('.dot');
            if(navigator.onLine) {
                statusBox.className = "status-pill online-glow";
                statusText.innerText = "ONLINE";
                dot.className = "dot online-dot";
            } else {
                statusBox.className = "status-pill offline-glow";
                statusText.innerText = "OFFLINE";
                dot.className = "dot offline-dot";
            }
        }
        window.addEventListener('online', updateNetStatus);
        window.addEventListener('offline', updateNetStatus);
        window.onload = () => {
            document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
            updateNetStatus();
        };
    </script>
</body>
</html>
