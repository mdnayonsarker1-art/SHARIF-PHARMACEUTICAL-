<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e40af, #0f172a);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%; max-width: 400px;
        }
        .input-field {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 2px solid #e2e8f0; margin-bottom: 15px;
            outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: #2563eb; }
        .action-btn {
            width: 100%; padding: 12px; border-radius: 12px;
            background: #2563eb; color: white; font-weight: bold;
            transition: 0.3s; margin-bottom: 10px;
        }
        .action-btn:hover { background: #1e40af; }
        .toggle-text { color: #64748b; font-size: 14px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div class="login-card animate__animated animate__zoomIn">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-blue-800">SHARIF PHARMA</h1>
            <p id="form-title" class="text-slate-500 font-bold uppercase text-xs tracking-widest mt-2">Login to Account</p>
        </div>

        <div id="login-form">
            <input type="email" id="email" class="input-field" placeholder="Email Address">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <button id="loginBtn" class="action-btn">LOGIN</button>
            <p class="toggle-text" onclick="toggleForm()">Don't have an account? <span class="text-blue-600 font-bold">Sign Up</span></p>
        </div>

        <div id="signup-form" class="hidden">
            <input type="email" id="new-email" class="input-field" placeholder="New Email">
            <input type="password" id="new-password" class="input-field" placeholder="New Password">
            <button id="signupBtn" class="action-btn bg-emerald-600 hover:bg-emerald-700">CREATE ACCOUNT</button>
            <p class="toggle-text" onclick="toggleForm()">Already have an account? <span class="text-blue-600 font-bold">Login</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার নতুন Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAQyZ3CcmzNxVbq2xwj-P89xohIVODrh1Y",
            authDomain: "nayon366-f79c6.firebaseapp.com",
            projectId: "nayon366-f79c6",
            storageBucket: "nayon366-f79c6.firebasestorage.app",
            messagingSenderId: "462628331277",
            appId: "1:462628331277:web:22bf04b3e0221470981a44",
            measurementId: "G-KRYX309ER8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // লগইন করা থাকলে সরাসরি ড্যাশবোর্ডে পাঠানো
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        // লগইন ফাংশন
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'index.html';
            } catch (err) {
                alert("ভুল ইমেইল বা পাসওয়ার্ড!");
            }
        };

        // সাইন-আপ ফাংশন
        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('new-email').value;
            const pass = document.getElementById('new-password').value;
            if(pass.length < 6) return alert("পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!");
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("অ্যাকাউন্ট তৈরি হয়েছে!");
                window.location.href = 'index.html';
            } catch (err) {
                alert("অ্যাকাউন্ট তৈরি করা যায়নি! ইমেইল চেক করুন।");
            }
        };

        // ফর্ম পরিবর্তন
        window.toggleForm = () => {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
            const title = document.getElementById('form-title');
            title.innerText = title.innerText === 'LOGIN TO ACCOUNT' ? 'CREATE NEW ACCOUNT' : 'LOGIN TO ACCOUNT';
        };
    </script>
</body>
</html>
