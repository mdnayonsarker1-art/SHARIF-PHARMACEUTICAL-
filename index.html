<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharife Pharma Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { 
            background-color: #f8fafc;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0; padding-bottom: 120px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Top Bar --- */
        .top-bar {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
        }
        .profile-img {
            width: 50px; height: 50px; border-radius: 12px;
            object-fit: cover; border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- Clock Style --- */
        .clock {
            width: 180px; height: 180px; background: #ffffff;
            border-radius: 50%; 
            border: 10px solid #111827; /* Dark Black Border */
            position: relative; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .marks-container { position: absolute; width: 100%; height: 100%; }
        .mark { position: absolute; width: 2px; height: 100%; left: 50%; margin-left: -1px; }
        .mark::before { content: ''; position: absolute; top: 6px; width: 2px; height: 6px; background: #cbd5e1; }
        .mark.bold::before { width: 3px; height: 10px; background: #475569; }

        .clock .number {
            position: absolute; width: 100%; height: 100%;
            text-align: center; font-size: 16px; font-weight: 900;
            color: #111827; padding: 12px; z-index: 2;
        }
        
        #clock-date {
            position: absolute; bottom: 42px; left: 50%; transform: translateX(-50%);
            background: #f1f5f9; padding: 2px 10px; border-radius: 6px;
            font-size: 10px; font-weight: 900; color: #1e293b; border: 1px solid #e2e8f0;
        }

        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour-hand { width: 7px; height: 45px; background: #1f2937; z-index: 3; margin-left: -3.5px; }
        .min-hand { width: 4px; height: 65px; background: #4b5563; z-index: 2; margin-left: -2px; }
        .sec-hand { width: 2px; height: 75px; background: #ef4444; z-index: 4; margin-left: -1px; } 
        .clock::after { content: ''; position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #ef4444; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; border: 2.5px solid white; }

        /* --- Brand Title (Corrected Colors) --- */
        .brand-section {
            text-align: center; margin-top: 30px; margin-bottom: 30px;
        }
        .brand-red { color: #ef4444; font-size: 24px; font-weight: 900; letter-spacing: 2px; display: block; }
        .brand-blue { color: #3b82f6; font-size: 20px; font-weight: 900; letter-spacing: 1px; line-height: 1.2; display: block; }

        /* --- Menu Grid --- */
        .menu-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; padding: 0 20px; max-width: 400px;
        }
        .menu-card { 
            padding: 25px 10px; border-radius: 22px;
            text-align: center; background: #ffffff;
            transition: 0.3s ease; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .menu-card:active { transform: scale(0.95); }
        .menu-card i { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .menu-card p { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; }

        .card-history { border-bottom: 4px solid #3b82f6; } .card-history i { color: #3b82f6; }
        .card-summary { border-bottom: 4px solid #10b981; } .card-summary i { color: #10b981; }
        .card-paid-entry { border-bottom: 4px solid #f43f5e; } .card-paid-entry i { color: #f43f5e; }
        .card-paid-list { border-bottom: 4px solid #a855f7; } .card-paid-list i { color: #a855f7; }

        /* --- Bottom Dark Navbar --- */
        .bottom-nav { 
            position: fixed; bottom: 20px; width: 92%; max-width: 380px; 
            background: #111827; height: 75px; border-radius: 40px; 
            display: flex; justify-content: space-around; align-items: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 1000;
        }
        .nav-link { color: #94a3b8; font-size: 22px; }
        .nav-link.active { color: #ffffff; }

        .fab-button { 
            width: 70px; height: 70px; background: #3b82f6; 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            color: white; font-size: 28px; position: absolute; top: -35px; left: 50%; 
            transform: translateX(-50%); border: 6px solid #f8fafc;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }

        /* Rotation Helper for Numbers */
        .number span { display: inline-block; }
        .n1 { transform: rotate(30deg); } .n1 span { transform: rotate(-30deg); }
        .n2 { transform: rotate(60deg); } .n2 span { transform: rotate(-60deg); }
        .n3 { transform: rotate(90deg); } .n3 span { transform: rotate(-90deg); }
        .n4 { transform: rotate(120deg); } .n4 span { transform: rotate(-120deg); }
        .n5 { transform: rotate(150deg); } .n5 span { transform: rotate(-150deg); }
        .n6 { transform: rotate(180deg); } .n6 span { transform: rotate(-180deg); }
        .n7 { transform: rotate(210deg); } .n7 span { transform: rotate(-210deg); }
        .n8 { transform: rotate(240deg); } .n8 span { transform: rotate(-240deg); }
        .n9 { transform: rotate(270deg); } .n9 span { transform: rotate(-270deg); }
        .n10 { transform: rotate(300deg); } .n10 span { transform: rotate(-300deg); }
        .n11 { transform: rotate(330deg); } .n11 span { transform: rotate(-330deg); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="flex flex-col items-center">
            <img class="profile-img" src="https://via.placeholder.com/150" alt="User">
            <p class="text-[9px] font-black text-slate-400 mt-1">:NAYON SARKER</p>
        </div>
        <div class="flex gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-slate-400 border border-slate-50 shadow-sm"><i class="fa-solid fa-sliders"></i></div>
            <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-400 border border-red-50 shadow-sm"><i class="fa-solid fa-power-off"></i></div>
        </div>
    </div>

    <div class="clock">
        <div id="marks" class="marks-container"></div>
        <div class="number n12"><span>12</span></div>
        <div class="number n1"><span>1</span></div><div class="number n2"><span>2</span></div>
        <div class="number n3"><span>3</span></div><div class="number n4"><span>4</span></div>
        <div class="number n5"><span>5</span></div><div class="number n6"><span>6</span></div>
        <div class="number n7"><span>7</span></div><div class="number n8"><span>8</span></div>
        <div class="number n9"><span>9</span></div><div class="number n10"><span>10</span></div>
        <div class="number n11"><span>11</span></div>
        <div id="clock-date">27 MAR</div>
        <div class="hand hour-hand" id="hour"></div>
        <div class="hand min-hand" id="min"></div>
        <div class="hand sec-hand" id="sec"></div>
    </div>

    <div class="brand-section">
        <span class="brand-red">SHARIFE</span>
        <span class="brand-blue">PHARMACEUTICAL LIMITED.</span>
    </div>

    <div class="menu-grid">
        <div class="menu-card card-history"><i class="fa-solid fa-file-invoice-dollar"></i><p>History</p></div>
        <div class="menu-card card-summary"><i class="fa-solid fa-chart-pie"></i><p>Summary</p></div>
        <div class="menu-card card-paid-entry"><i class="fa-solid fa-wallet"></i><p>Paid Entry</p></div>
        <div class="menu-card card-paid-list"><i class="fa-solid fa-list-check"></i><p>Paid List</p></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active"><i class="fa-solid fa-house"></i></div>
        <div class="fab-button"><i class="fa-solid fa-plus"></i></div>
        <div class="nav-link"><i class="fa-solid fa-gear"></i></div>
    </nav>

    <script>
        const marks = document.getElementById('marks');
        for (let i = 0; i < 60; i++) {
            const mark = document.createElement('div');
            mark.className = 'mark';
            if (i % 5 === 0) mark.classList.add('bold');
            mark.style.transform = `rotate(${i * 6}deg)`;
            marks.appendChild(mark);
        }

        function updateClock() {
            const now = new Date();
            const s = now.getSeconds(); 
            const m = now.getMinutes(); 
            const h = now.getHours();
            document.getElementById('sec').style.transform = `rotate(${s * 6}deg)`;
            document.getElementById('min').style.transform = `rotate(${m * 6 + s/10}deg)`;
            document.getElementById('hour').style.transform = `rotate(${h * 30 + m/2}deg)`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
