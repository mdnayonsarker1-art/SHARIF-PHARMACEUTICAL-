<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Dashboard</title>
    
    <meta name="theme-color" content="#4277F5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { 
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(66, 119, 245, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 100px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .net-status {
            position: fixed; top: 20px; right: 20px;
            font-size: 9px; font-weight: 900; padding: 5px 12px;
            border-radius: 12px; text-transform: uppercase; z-index: 2000;
        }
        .online { background: #dcfce7; color: #166534; }
        .offline { background: #fee2e2; color: #991b1b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        #auth-container {
            display: none; 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            width: 90%; max-width: 380px; text-align: center;
            margin-top: 10vh;
        }

        .input-field { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 1px solid #e2e8f0; border-radius: 16px; outline: none;
        }
        
        .auth-btn { 
            width: 100%; padding: 14px; background: #4277F5; color: white; 
            border-radius: 16px; font-weight: 800; margin-top: 15px; cursor: pointer;
        }

        .bottom-nav {
            position: fixed; bottom: 20px; width: 90%; max-width: 400px;
            background: white; height: 70px; border-radius: 35px;
            display: none; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 1000;
            border: 1px solid #f1f5f9;
        }

        .add-entry-fab {
            width: 75px; height: 75px;
            background: linear-gradient(135deg, #4277F5, #2563eb);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 28px; position: absolute; top: -35px; left: 50%;
            transform: translateX(-50%); border: 6px solid #f8fafc;
            box-shadow: 0 10px 20px rgba(66, 119, 245, 0.3); cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item { color: #94a3b8; font-size: 22px; cursor: pointer; }

        #dashboard-content {
            display: none; width: 100%; max-width: 450px; padding: 30px 20px;
        }

        .menu-card {
            padding: 25px 15px; border-radius: 28px; 
            text-align: center; cursor: pointer; color: white;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #ffffff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .menu-card:active { transform: scale(0.92); }

        .card-blue { background: linear-gradient(135deg, #4277F5, #2563eb); }
        .card-green { background: linear-gradient(135deg, #10b981, #059669); }
        .card-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .card-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }

        #home-logo { width: 90px; height: 90px; border-radius: 25px; object-fit: cover; margin: 0 auto 15px; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        #clock {
            background: white; padding: 6px 15px; border-radius: 20px;
            font-size: 11px; font-weight: 800; color: #64748b;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div id="net-status" class="net-status online">Online</div>

    <div id="auth-container" class="animate__animated animate__fadeIn">
        <i class="fa-solid fa-prescription-bottle-medical text-4xl text-[#4277F5] mb-4"></i>
        <h2 id="auth-title" class="text-xl font-black text-slate-800 uppercase mb-4">Sharif Pharma</h2>
        
        <input type="email" id="email" class="input-field" placeholder="Email Address">
        <input type="password" id="password" class="input-field" placeholder="Password">
        
        <div class="text-right px-1 mb-2">
            <span onclick="forgotPassword()" class="text-[10px] font-bold text-slate-400 cursor-pointer hover:text-[#4277F5] uppercase">
                Forgot Password?
            </span>
        </div>

        <button id="authBtn" class="auth-btn">LOGIN</button>
        
        <p class="mt-6 text-[11px] font-bold text-slate-400 uppercase cursor-pointer" onclick="toggleAuthMode()">
            <span id="toggle-text">Create New Account</span>
        </p>
    </div>

    <div id="dashboard-content" class="animate__animated animate__fadeIn">
        <div class="flex justify-between items-center mb-8">
            <div id="logout-btn" class="w-11 h-11 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 cursor-pointer">
                <i class="fa-solid fa-power-off"></i>
            </div>
            <div onclick="window.location.href='settings.html'" class="w-11 h-11 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-500 cursor-pointer">
                <i class="fa-solid fa-sliders"></i>
            </div>
        </div>

        <header class="text-center mb-10">
            <img id="home-logo" src="logo.png" class="hidden mx-auto" alt="Logo">
            <h1 id="display-biz-name" class="text-3xl font-black uppercase tracking-tight leading-tight mb-4">
                SHARIF <span style="color: #4277F5;">PHARMA</span>
            </h1>
            <span id="clock">LOADING...</span>
        </header>

        <div class="grid grid-cols-2 gap-5 px-1">
            <div onclick="window.location.href='history.html'" class="menu-card card-blue">
                <i class="fa-solid fa-file-invoice-dollar text-2xl mb-2"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">History</p>
            </div>
            <div onclick="window.location.href='daily-hisab.html'" class="menu-card card-green">
                <i class="fa-solid fa-chart-pie text-2xl mb-2"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">Summary</p>
            </div>
            <div onclick="window.location.href='paid-entry.html'" class="menu-card card-red">
                <i class="fa-solid fa-wallet text-2xl mb-2"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">Paid Entry</p>
            </div>
            <div onclick="window.location.href='payment-history.html'" class="menu-card card-purple">
                <i class="fa-solid fa-list-check text-2xl mb-2"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">Paid List</p>
            </div>
        </div>
    </div>

    <nav id="bottom-bar" class="bottom-nav">
        <div class="nav-item" style="color: #4277F5;" onclick="location.reload()"><i class="fa-solid fa-house"></i></div>
        <div onclick="window.location.href='details.html'" class="add-entry-fab shadow-lg">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="nav-item" onclick="window.location.href='settings.html'"><i class="fa-solid fa-gear"></i></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQyZ3CcmzNxVbq2xwj-P89xohIVODrh1Y",
            authDomain: "nayon366-f79c6.firebaseapp.com",
            projectId: "nayon366-f79c6",
            storageBucket: "nayon366-f79c6.firebasestorage.app",
            messagingSenderId: "462628331277",
            appId: "1:462628331277:web:22bf04b3e0221470981a44"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ✅ Firestore Offline Support
        enableIndexedDbPersistence(db).catch((err) => {
            console.log("Persistence error:", err.code);
        });

        onAuthStateChanged(auth, (user) => {
            const dashboard = document.getElementById('dashboard-content');
            const loginBox = document.getElementById('auth-container');
            const bottomBar = document.getElementById('bottom-bar');

            if (user && user.emailVerified) {
                loginBox.style.display = 'none';
                dashboard.style.display = 'block';
                bottomBar.style.display = 'flex';
                
                onSnapshot(doc(db, "user_settings", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.profile) {
                            if (data.profile.bizName) {
                                const fullName = data.profile.bizName.trim();
                                const firstSpace = fullName.indexOf(' ');
                                if (firstSpace !== -1) {
                                    const first = fullName.substring(0, firstSpace);
                                    const rest = fullName.substring(firstSpace);
                                    document.getElementById('display-biz-name').innerHTML = `<span class="text-red-600">${first}</span><span style="color: #4277F5;">${rest}</span>`;
                                } else {
                                    document.getElementById('display-biz-name').innerHTML = `<span class="text-red-600">${fullName}</span>`;
                                }
                            }
                            if (data.profile.photo) {
                                const logo = document.getElementById('home-logo');
                                logo.src = data.profile.photo;
                                logo.classList.remove('hidden');
                            }
                        }
                    }
                });
            } else {
                loginBox.style.display = 'block';
                dashboard.style.display = 'none';
                bottomBar.style.display = 'none';
            }
        });

        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const isLogin = document.getElementById('authBtn').innerText === "LOGIN";
            if(!email || !pass) return alert("Please fill all fields!");
            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    alert("Verification email sent!");
                    signOut(auth);
                }
            } catch (err) { alert(err.message); }
        };

        window.forgotPassword = async () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Enter email first!");
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Reset link sent!");
            } catch (err) { alert(err.message); }
        };

        window.toggleAuthMode = () => {
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('toggle-text');
            if(btn.innerText === "LOGIN") {
                btn.innerText = "CREATE ACCOUNT";
                toggle.innerText = "Back to Login";
            } else {
                btn.innerText = "LOGIN";
                toggle.innerText = "Create New Account";
            }
        };

        document.getElementById('logout-btn').onclick = () => { if(confirm("Logout?")) signOut(auth); };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('en-US', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }).toUpperCase();
        }
        setInterval(updateClock, 1000); updateClock();

        function updateNetStatus() {
            const status = document.getElementById('net-status');
            if(navigator.onLine) {
                status.innerText = "Online";
                status.className = "net-status online";
            } else {
                status.innerText = "Offline";
                status.className = "net-status offline";
            }
        }
        window.addEventListener('online', updateNetStatus);
        window.addEventListener('offline', updateNetStatus);
        updateNetStatus();

        // 🚀 SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // আপনার ফাইলের নাম sw.js রেখেছি এখানে
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Sharif Pharma PWA is ready!'))
                .catch(err => console.log('Service Worker failed', err));
            });
        }
    </script>
</body>
</html>
